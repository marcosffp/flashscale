apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: orchestrator-allow-only-gateway
  namespace: blackfriday
spec:
  podSelector:
    matchLabels:
      app: orchestrator
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gateway
