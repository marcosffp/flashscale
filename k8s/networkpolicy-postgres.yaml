# Etapa 10: api/orchestrator conectam via PgBouncer (negocio.md §7.5),
# nunca direto — postgres só aceita ingress de pgbouncer (negocio.md §5.4).
# Migrations (initContainer em deployment-api.yaml) também passam pelo
# PgBouncer, então não precisam de exceção nesta policy.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-allow-only-backend
  namespace: blackfriday
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: pgbouncer
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pgbouncer-allow-only-backend
  namespace: blackfriday
spec:
  podSelector:
    matchLabels:
      app: pgbouncer
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
        - podSelector:
            matchLabels:
              app: orchestrator
